<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Whiskey or Die">
  <defs>
    <!-- slick dark backdrop -->
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#33271a"/>
      <stop offset="45%" stop-color="#1b130c"/>
      <stop offset="100%" stop-color="#070504"/>
    </radialGradient>
    <!-- warm gold glow behind the bottle -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b25a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c8902f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8902f" stop-opacity="0"/>
    </radialGradient>
    <!-- luxe gold -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbe9a8"/>
      <stop offset="28%" stop-color="#e7bd61"/>
      <stop offset="52%" stop-color="#b67e1d"/>
      <stop offset="74%" stop-color="#e7bd61"/>
      <stop offset="100%" stop-color="#9a6a14"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcefb8"/>
      <stop offset="50%" stop-color="#d6a23e"/>
      <stop offset="100%" stop-color="#a9781f"/>
    </linearGradient>
    <!-- black glass -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="22%" stop-color="#2c2c2e"/>
      <stop offset="45%" stop-color="#141414"/>
      <stop offset="70%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <!-- glossy specular streak -->
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="url(#gold)" stroke-width="4" stroke-opacity="0.85"/>
  <rect x="18" y="18" width="476" height="476" rx="96" fill="none" stroke="#e7bd61" stroke-width="1" stroke-opacity="0.25"/>

  <!-- glow + reflection -->
  <ellipse cx="256" cy="250" rx="150" ry="190" fill="url(#glow)"/>
  <ellipse cx="256" cy="452" rx="92" ry="17" fill="#e7bd61" opacity="0.18" filter="url(#soft)"/>

  <g>
    <!-- cap -->
    <rect x="231" y="92" width="50" height="30" rx="6" fill="url(#goldV)" stroke="#6f4e10" stroke-width="1"/>
    <rect x="226" y="120" width="60" height="30" rx="5" fill="url(#gold)" stroke="#6f4e10" stroke-width="1"/>

    <!-- glass body -->
    <path d="M232 150 L232 198
             C232 216 198 222 192 252
             C187 280 185 296 185 410
             Q185 446 215 446
             L297 446
             Q327 446 327 410
             C327 296 325 280 320 252
             C314 222 280 216 280 198
             L280 150 Z"
          fill="url(#glass)" stroke="url(#gold)" stroke-width="3"/>

    <!-- glossy highlight streak -->
    <path d="M213 205 C205 240 203 300 205 430 L228 430 C226 300 228 240 234 206 Z"
          fill="url(#gloss)" opacity="0.9"/>

    <!-- gold label -->
    <rect x="196" y="300" width="120" height="92" rx="9" fill="url(#gold)" stroke="#6f4e10" stroke-width="1.5"/>
    <rect x="204" y="308" width="104" height="76" rx="6" fill="none" stroke="#5e4310" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- emblem: diamond + monogram -->
    <path d="M256 320 L274 344 L256 368 L238 344 Z" fill="#1a1206"/>
    <path d="M256 328 L268 344 L256 360 L244 344 Z" fill="url(#goldV)"/>
    <text x="256" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#1a1206">W</text>
  </g>
</svg>
